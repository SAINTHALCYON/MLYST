<!DOCTYPE html>
<html>
<head>
<title>sthalcyon's lounge</title>

<style>
body{
background:#fff2f7;
font-family:Verdana;
color:#555;
overflow-x:hidden;
}

.page{
width:900px;
margin:auto;
background:white;
border:4px double pink;
padding:10px;
position:relative;
}

/* TOP BANNER */
.header img{
width:100%;
max-height:180px;
object-fit:cover;
border-bottom:4px dashed pink;
}

/* FALLING HEARTS */
.heart{
position:fixed;
top:-50px;
font-size:20px;
animation:fall linear infinite;
z-index:999;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

/* BUTTON */
.homebtn{
background:#ffd6eb;
border:2px solid pink;
padding:6px 12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin:10px 0;
}

/* BANNERS */
.bannerbox{
display:flex;
gap:10px;
margin:10px 0;
}

.bannerbox img{
width:100px;
border:2px solid pink;
border-radius:8px;
cursor:pointer;
}

/* CHATBOX */
.chatbox{
background:#fff0f7;
border:3px ridge pink;
padding:10px;
margin-top:15px;
}

.chatlog{
height:180px;
overflow-y:auto;
background:white;
border:1px solid pink;
padding:5px;
margin-bottom:5px;
font-size:13px;
}

.msg{
margin-bottom:4px;
}

.time{
font-size:10px;
color:#aaa;
}

input,button{
padding:5px;
border-radius:6px;
border:1px solid pink;
}

/* FOOTER */
.footer{
text-align:center;
font-size:11px;
color:#aaa;
margin-top:15px;
}
</style>
</head>

<body>

<div class="page">

<div class="header">
<img src="AMEBANNER.gif">
</div>

<button class="homebtn" onclick="location.href='index.html'">← Back to Homepage!</button>

<div class="bannerbox">
<img src="DIVIDER.png">
<img src="DIVIDER.png">
<img src="DIVIDER.png">
</div>

<p>be mindful and don't be retarded ♡</p>

<!-- CHATBOX -->
<div class="chatbox">
<b>sthalcyon's lounge</b>

<div class="chatlog" id="chatlog"></div>

<input type="text" id="name" placeholder="name" size="10">
<input type="text" id="msg" placeholder="message" size="25">
<button onclick="sendMsg()">Send</button>
</div>

<div class="footer">
Made with love ♡
</div>

</div>

<!-- FIREBASE + HEARTS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnehPjjKdIE92wm5gPDd-pCCh8NqhuNzI",
  authDomain: "sainthalcyon-d9ddc.firebaseapp.com",
  projectId: "sainthalcyon-d9ddc",
  storageBucket: "sainthalcyon-d9ddc.firebasestorage.app",
  messagingSenderId: "1046819219134",
  appId: "1:1046819219134:web:a5f4758396b90eea75e0ef"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatlog = document.getElementById("chatlog");

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot)=>{
  chatlog.innerHTML = "";
  snapshot.forEach(doc=>{
    let d = doc.data();
    let date = new Date(d.time);
    let time = date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    chatlog.innerHTML += `
      <div class="msg">
        <b>${d.name}:</b> ${d.msg}
        <div class="time">${time}</div>
      </div>
    `;
  });
  chatlog.scrollTop = chatlog.scrollHeight;
});

// send message
window.sendMsg = async function(){
  let name = document.getElementById("name").value;
  let msg = document.getElementById("msg").value;

  if(name && msg){
    await addDoc(collection(db,"messages"),{
      name:name,
      msg:msg,
      time: Date.now()
    });
    document.getElementById("msg").value="";
  }
}

// falling hearts
function createHeart(){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💗";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=3+Math.random()*5+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),8000);
}
setInterval(createHeart,400);

</script>

</body>
</html>
