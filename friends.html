<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>my friends ✿</title>

<style>
body{
  background:url("http://i.pinimg.com/1200x/b4/0e/ad/b40ead081804ce1887e13ba2fc1562ed.jpg");
  font-family:Tahoma, Verdana;
  margin:0;
  color:#faa0c0;
}

#window{
  width:800px;
  margin:40px auto;
  background:#e8f3ff;
  border:4px ridge #9fc6ff;
}

#titlebar{
  background:linear-gradient(to right,#b8d9ff,#fbc0e6);
  color:#faa0c0;
  padding:6px;
  font-weight:bold;
}

#app{
  display:flex;
  padding:6px;
  gap:6px;
}

#left{
  width:220px;
  background:#fff0fa;
  border:2px inset #ffaad5;
  padding:6px;
}

#main{
  flex:1;
  background:#f7fbff;
  border:2px inset #a5c8ff;
  padding:6px;
}

.friend{
  background:linear-gradient(#fff,#ffe7f6);
  border:1px solid #ff9ecb;
  margin-bottom:6px;
  padding:6px;
  color:#ff77aa;
}

.button{
  background:#ff99cc;
  border:1px solid #ff7fbf;
  padding:6px;
  text-align:center;
  margin-top:10px;
  border-radius:4px;
  cursor:pointer;
}

.button a{
  color:#fff;
  text-decoration:none;
}

#player{
  background:#e8f3ff;
  border:1px solid #a5c8ff;
  padding:6px;
  margin-bottom:10px;
  text-align:center;
}

#playBtn{
  background:#ff99cc;
  color:#fff;
  padding:6px;
  margin-top:6px;
  border-radius:4px;
  border:1px solid #ff7fbf;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="window">
<div id="titlebar">✿ my friends list ✿</div>

<div id="app">

<div id="left">

<div id="player">
🎵 now playing<br>

<div id="yt"></div>

</div>

<div class="button">
<a href="index.html">← back to homepage</a>
</div>

</div>

<div id="main">
  <div class="friend">wyatt ♡<br><small>online</small></div>
  <div class="friend">nat ✿<br><small>irl</small></div>

  <div class="friend">moodle ♡<br><small>online</small></div>
  <div class="friend">frank ✿<br><small>online</small></div>
  <div class="friend">crunch ☆<br><small>online</small></div>
</div>

</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let playing = false;
const videoId = "q1RrwH0kyxM";   // from https://youtu.be/q1RrwH0kyxM&list=RDq1RrwH0kyxM&start_radio=1

function onYouTubeIframeAPIReady() {
  player = new YT.Player('yt', {
    height: '0',
    width: '0',
    videoId: videoId,
    playerVars: {
      autoplay: 0,
      loop: 1,
      playlist: videoId
    }
  });
}

document.getElementById("playBtn").onclick = () => {
  if (!player) return;

  if (playing) {
    player.pauseVideo();
    document.getElementById("playBtn").textContent = "▶ play";
    playing = false;
  } else {
    player.playVideo();
    document.getElementById("playBtn").textContent = "▐▐ pause";
    playing = true;
  }
};
</script>

</body>
</html>
